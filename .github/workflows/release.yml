name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify release tag matches package.json version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Determine npm dist-tag
        id: disttag
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* || "$IS_PRERELEASE" == "true" ]]; then
            # Pre-release: publish under a non-default dist-tag so it never becomes
            # the `latest` that plain `npm install` resolves to.
            if [[ "$VERSION" == *-* ]]; then
              # Derive the identifier from the version (e.g. 1.2.0-beta.1 -> beta).
              PREID="$(echo "${VERSION#*-}" | cut -d. -f1)"
            else
              PREID="next"
            fi
            if ! echo "$PREID" | grep -Eq '^[a-zA-Z][a-zA-Z0-9-]*$'; then
              PREID="next"
            fi
            echo "tag=$PREID" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing $VERSION under dist-tag: $(tail -n1 "$GITHUB_OUTPUT")"

      - name: Publish to npm
        run: npm publish --access public --tag "${{ steps.disttag.outputs.tag }}"
