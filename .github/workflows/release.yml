name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing (and provenance)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Determine npm dist-tag
        id: disttag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            # Pre-release (e.g. 1.2.0-beta.1): publish under its identifier
            # (beta/alpha/rc/...) so it never becomes the default `latest`.
            PREID="$(echo "${VERSION#*-}" | cut -d. -f1)"
            if ! echo "$PREID" | grep -Eq '^[a-zA-Z][a-zA-Z0-9-]*$'; then
              PREID="next"
            fi
            echo "tag=$PREID" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing $VERSION under dist-tag: $(tail -n1 "$GITHUB_OUTPUT")"

      - name: Publish to npm
        # Auth is via OIDC trusted publishing (no NPM_TOKEN needed).
        # Provenance is generated automatically for trusted publishing.
        run: npm publish --access public --tag "${{ steps.disttag.outputs.tag }}"
